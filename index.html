<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Neon & Memory: 2700年のノスタルジア - マルチエンディング型SFテキストアドベンチャー">
  <title>Neon & Memory: 2700年のノスタルジア</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game">
    <!-- 背景Canvas -->
    <canvas id="bg-canvas"></canvas>

    <!-- CRT & ビネットエフェクト -->
    <div id="vignette"></div>
    <div id="crt-overlay"></div>

    <!-- タイトル画面 -->
    <div id="title-screen">
      <div class="title-main">Neon &amp; Memory</div>
      <div class="title-sub">2700年のノスタルジア</div>
      <div class="title-start">── Click to Start ──</div>
    </div>

    <!-- HUD (Karma表示 & ボタン類) -->
    <div id="hud">
      <!-- Karma表示 -->
      <div id="karma-display">
        <div class="karma-row">
          <span class="karma-label logic-label">LOGIC</span>
          <div class="karma-bar-bg"><div id="karma-logic-bar" class="karma-bar logic-bar"></div></div>
          <span class="karma-num" id="karma-logic-val">0</span>
        </div>
        <div class="karma-row">
          <span class="karma-label humanity-label">HEART</span>
          <div class="karma-bar-bg"><div id="karma-humanity-bar" class="karma-bar humanity-bar"></div></div>
          <span class="karma-num" id="karma-humanity-val">0</span>
        </div>
      </div>

      <!-- Save / Load / Backlog ボタン -->
      <div id="hud-buttons">
        <button id="save-btn" class="hud-btn">SAVE</button>
        <button id="load-btn" class="hud-btn disabled">LOAD</button>
        <button id="backlog-btn" class="hud-btn">LOG</button>
      </div>
    </div>

    <!-- フラッシュメッセージ -->
    <div id="flash-message"></div>

    <!-- テキストウィンドウ -->
    <div id="text-window">
      <div id="speaker-name"></div>
      <div id="text-content"></div>
      <div id="click-indicator"></div>
    </div>

    <!-- 選択肢コンテナ -->
    <div id="choices-container"></div>

    <!-- バックログパネル -->
    <div id="backlog-panel">
      <div id="backlog-header">
        <span>MESSAGE LOG</span>
        <button id="backlog-close-btn">✕</button>
      </div>
      <div id="backlog-content"></div>
    </div>

    <!-- エンディングオーバーレイ -->
    <div id="ending-overlay" class="ending-overlay">
      <div id="ending-title"></div>
      <div id="ending-message"></div>
      <button id="restart-btn">もう一度始める</button>
    </div>
  </div>

  <!-- Scripts (順序が重要) -->
  <script src="js/audio.js"></script>
  <script src="js/scenario.js"></script>
  <script src="js/background.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
